<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: system-ui, sans-serif; }
#c { position: fixed; inset: 0; width: 100%; height: 100%; }

/* Overlay message shown first */
#overlay {
  position: fixed; inset: 0; z-index: 20;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px;
  background: rgba(0,0,0,0.0);
  pointer-events: none;
}

#msg-box {
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  animation: fadeIn 1.8s ease forwards;
  pointer-events: all;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

#msg-line1 {
  font-size: clamp(22px, 5vw, 38px);
  font-weight: 700;
  color: #fff;
  text-align: center;
  letter-spacing: 0.01em;
  text-shadow: 0 0 30px rgba(255,80,160,0.7), 0 0 60px rgba(255,80,160,0.3);
  line-height: 1.3;
}

#msg-line2 {
  font-size: clamp(14px, 3vw, 20px);
  color: rgba(255,180,210,0.85);
  text-align: center;
  letter-spacing: 0.04em;
  text-shadow: 0 0 20px rgba(255,80,160,0.5);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 0.7; }
  50%      { opacity: 1; }
}

#name-input-wrap {
  display: flex; gap: 10px; align-items: center;
  margin-top: 8px;
}

#name-inp {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,120,170,0.5);
  color: #fff;
  padding: 12px 22px;
  border-radius: 50px;
  font-size: 17px;
  outline: none;
  width: 210px;
  font-family: inherit;
  text-align: center;
  letter-spacing: 0.06em;
  transition: border-color 0.3s;
}
#name-inp::placeholder { color: rgba(255,150,190,0.45); letter-spacing: 0.04em; }
#name-inp:focus { border-color: rgba(255,100,160,0.9); box-shadow: 0 0 16px rgba(255,80,160,0.25); }

#go-btn {
  background: rgba(255,60,130,0.25);
  border: 1px solid rgba(255,100,160,0.6);
  color: #fff;
  padding: 12px 22px;
  border-radius: 50px;
  font-size: 15px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s, box-shadow 0.2s;
  letter-spacing: 0.03em;
}
#go-btn:hover {
  background: rgba(255,60,130,0.45);
  box-shadow: 0 0 18px rgba(255,80,160,0.4);
}

/* Bottom UI after name typed */
#ui {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10;
  opacity: 0; pointer-events: none; transition: opacity 0.8s;
}
#ui.show { opacity: 1; pointer-events: all; }

#status { color: rgba(255,180,210,0.5); font-size: 12px; }

/* Floating name display */
#name-display {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; z-index: 5; gap: 6px;
  opacity: 0; transition: opacity 1s;
}
#name-display.show { opacity: 1; }

#typed-name {
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.08em;
  text-shadow: 0 0 30px rgba(255,80,160,0.9), 0 0 80px rgba(255,80,160,0.4);
  text-align: center;
}
#love-line {
  font-size: clamp(14px, 2.5vw, 20px);
  color: rgba(255,180,210,0.8);
  letter-spacing: 0.12em;
  text-shadow: 0 0 16px rgba(255,80,160,0.6);
  text-align: center;
  animation: pulse 2.5s ease-in-out infinite;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Name display overlay (shown after submission) -->
<div id="name-display">
  <div id="typed-name"></div>
  <div id="love-line">i love you ❤</div>
</div>

<!-- Initial message overlay -->
<div id="overlay">
  <div id="msg-box">
    <div id="msg-line1">babe, type your name 🥺❤</div>
    <div id="msg-line2">i made something for you...</div>
    <div id="name-input-wrap">
      <input id="name-inp" type="text" placeholder="your name..." maxlength="20" autocomplete="off"/>
      <button id="go-btn">show ❤</button>
    </div>
  </div>
</div>

<div id="ui">
  <div id="status">double-click to restart ❤</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const nameInp = document.getElementById('name-inp');
  const goBtn = document.getElementById('go-btn');
  const uiEl = document.getElementById('ui');
  const nameDisplay = document.getElementById('name-display');
  const typedNameEl = document.getElementById('typed-name');

  let W, H, CX, CY, dpr;

  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    CX = W/2; CY = H/2;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.scale(dpr, dpr);
    if(appState === 0 || appState === 1) buildHeart();
  }

  const N = 12000;
  const px = new Float32Array(N), py = new Float32Array(N), pz = new Float32Array(N);
  const vx = new Float32Array(N), vy = new Float32Array(N), vz = new Float32Array(N);
  const tx = new Float32Array(N), ty = new Float32Array(N), tz = new Float32Array(N);
  const phase = new Float32Array(N);
  const pdepth = new Float32Array(N);

  // 0=heart idle, 1=heart (name shown), 2=text forming, 3=text+repel
  let appState = 0;
  let mouseX = -9999, mouseY = -9999;
  let t = 0;
  const FOV = 600, CAM_Z = 700;

  function heartX(t){ return 16 * Math.pow(Math.sin(t), 3); }
  function heartY(t){ return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

  function buildHeart(){
    const baseDim = Math.min(W, H);
    const scale = baseDim * 0.021;
    for(let i = 0; i < N; i++){
      const theta = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random());
      const hx = heartX(theta) * r;
      const hy = heartY(theta) * r;
      const maxDepth = (1 - r) * 5.5;
      const hz = (Math.random() * 2 - 1) * maxDepth;
      tx[i] = hx * scale;
      ty[i] = -hy * scale;
      tz[i] = hz * scale;
      pdepth[i] = r;
      phase[i] = Math.random() * Math.PI * 2;
    }
  }

  function initParticles(){
    for(let i = 0; i < N; i++){
      px[i] = (Math.random()-0.5)*W*2;
      py[i] = (Math.random()-0.5)*H*2;
      pz[i] = (Math.random()-0.5)*800;
      vx[i] = vy[i] = vz[i] = 0;
    }
  }

  function sampleText(phrase){
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const c2 = off.getContext('2d');
    const words = phrase.split(' ');
    const lines = []; let cur = '';
    const maxC = phrase.length > 20 ? 10 : 18;
    words.forEach(w => {
      if((cur+w).length > maxC){ lines.push(cur.trim()); cur = w+' '; }
      else cur += w+' ';
    });
    lines.push(cur.trim());
    let fs = Math.min(W*0.65/(maxC*0.5), H*0.45/lines.length, 160);
    c2.fillStyle='#fff';
    c2.font=`900 ${fs}px Arial Black,Arial,sans-serif`;
    c2.textAlign='center'; c2.textBaseline='middle';
    const lh = fs*1.1;
    const sy0 = H/2 - (lines.length-1)*lh/2;
    lines.forEach((l,i) => c2.fillText(l, W/2, sy0+i*lh));
    const data = c2.getImageData(0,0,W,H).data;
    const pts = [];
    const step = phrase.length > 12 ? 2 : 1;
    for(let y=0;y<H;y+=step) for(let x=0;x<W;x+=step)
      if(data[(y*W+x)*4+3]>120)
        pts.push(x-W/2+(Math.random()-.5)*.8, y-H/2+(Math.random()-.5)*.8);
    for(let i=pts.length/2-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      const ia=i*2, ja=j*2;
      let tmp=pts[ia]; pts[ia]=pts[ja]; pts[ja]=tmp;
      tmp=pts[ia+1]; pts[ia+1]=pts[ja+1]; pts[ja+1]=tmp;
    }
    return pts;
  }

  let formTO;
  function formWord(phrase){
    if(!phrase.trim()) return;
    appState = 2;
    const pts = sampleText(phrase);
    const pC = pts.length/2;
    for(let i=0;i<N;i++){
      const idx=(i%pC)*2;
      tx[i]=pts[idx]; ty[i]=pts[idx+1]; tz[i]=0;
    }
    clearTimeout(formTO);
    formTO = setTimeout(()=>{ appState=3; }, 2500);
  }

  let beat=1, beatDir=1;
  const BEAT_SPEED=0.007, BEAT_AMP=0.07;
  let rotY=0;

  function update(){
    t += 0.005;
    if(appState<=1){
      rotY += 0.004;
      beat += BEAT_SPEED * beatDir;
      if(beat > 1+BEAT_AMP) beatDir=-1;
      if(beat < 1-BEAT_AMP*0.35) beatDir=1;
    } else {
      beat=1;
    }

    const REPEL_R=110, REPEL_F=9;

    for(let i=0;i<N;i++){
      let ttx=tx[i]*beat, tty=ty[i]*beat, ttz=tz[i]*beat;

      if(appState<=1){
        const cy=Math.cos(rotY), sy=Math.sin(rotY);
        const rx=ttx*cy - ttz*sy;
        const rz=ttx*sy + ttz*cy;
        ttx=rx; ttz=rz;
        ttx += Math.sin(t*6+phase[i])*1.0;
        tty += Math.cos(t*7+phase[i])*1.0;
        ttz += Math.sin(t*5+phase[i]*2)*1.0;
      }

      const sp = appState<=1 ? 0.018 : 0.025;
      vx[i] += (ttx-px[i])*sp;
      vy[i] += (tty-py[i])*sp;
      vz[i] += (ttz-pz[i])*sp;

      if(appState>=2 && mouseX>0){
        const sc=FOV/(FOV+pz[i]+CAM_Z);
        const sx=px[i]*sc+CX, sy2=py[i]*sc+CY;
        const rdx=sx-mouseX, rdy=sy2-mouseY;
        const d2=rdx*rdx+rdy*rdy;
        if(d2<REPEL_R*REPEL_R && d2>1){
          const d=Math.sqrt(d2);
          const mag=REPEL_F*(1-d/REPEL_R)*5;
          vx[i]+=(rdx/d)*mag; vy[i]+=(rdy/d)*mag;
        }
      }

      vx[i]*=0.80; vy[i]*=0.80; vz[i]*=0.80;
      px[i]+=vx[i]; py[i]+=vy[i]; pz[i]+=vz[i];
    }
  }

  function draw(){
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(0,0,W,H);

    for(let i=0;i<N;i++){
      const zPos=pz[i]+CAM_Z;
      if(zPos<10) continue;
      const sc=FOV/zPos;
      const sx=px[i]*sc+CX;
      const sy=py[i]*sc+CY;
      const spd=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);

      if(appState>=2){
        // Text: hot pink (matches the theme, not cyan)
        const d = pdepth[i];
        const a=Math.min(1,(0.25+spd*0.12)*(sc*0.75));
        const size=(0.38+spd*0.1)*sc;
        ctx.beginPath(); ctx.arc(sx,sy,size,0,6.2832);
        ctx.fillStyle=`hsla(330,100%,80%,${a})`;
        ctx.fill();
      } else {
        // Heart: dense pink/magenta glow
        const d=pdepth[i];
        const h = 330 + d*20;
        const s = 100;
        const l = 80 - d*50;
        const baseA = (0.9 - d*0.55) * (0.6 + spd*0.2);
        const a = Math.min(0.95, baseA * sc * 1.1);
        const size = Math.max(0.25, (0.55 - d*0.2 + spd*0.06)*sc);
        ctx.beginPath(); ctx.arc(sx,sy,size,0,6.2832);
        ctx.fillStyle=`hsla(${h},${s}%,${l}%,${a})`;
        ctx.fill();
      }
    }

    if(appState>=2 && mouseX>0){
      const grd=ctx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,110);
      grd.addColorStop(0,'rgba(255,80,160,0.06)');
      grd.addColorStop(1,'rgba(255,80,160,0)');
      ctx.beginPath(); ctx.arc(mouseX,mouseY,110,0,6.2832);
      ctx.fillStyle=grd; ctx.fill();
    }
  }

  function loop(){ update(); draw(); requestAnimationFrame(loop); }

  /* ── Submit name ── */
  function submitName(){
    const name = nameInp.value.trim();
    if(!name) return;

    // Fade out overlay
    overlay.style.transition = 'opacity 0.8s';
    overlay.style.opacity = '0';
    setTimeout(()=>{ overlay.style.display='none'; }, 800);

    // Show name + love line
    typedNameEl.textContent = name.toUpperCase();
    nameDisplay.classList.add('show');

    // Show bottom ui
    uiEl.classList.add('show');

    // After 2.5s, explode heart → form the name in particles
    appState = 1; // keep heart spinning briefly
    setTimeout(()=>{
      nameDisplay.classList.remove('show');
      formWord(name);
    }, 2800);
  }

  goBtn.addEventListener('click', submitName);
  nameInp.addEventListener('keydown', e=>{ if(e.key==='Enter') submitName(); });

  canvas.addEventListener('mousemove', e=>{ mouseX=e.clientX; mouseY=e.clientY; });
  canvas.addEventListener('mouseleave', ()=>{ mouseX=-9999; mouseY=-9999; });
  canvas.addEventListener('dblclick', ()=>{
    appState=0; buildHeart(); rotY=0;
    overlay.style.display='flex'; overlay.style.opacity='1';
    nameInp.value=''; nameDisplay.classList.remove('show');
    uiEl.classList.remove('show');
  });

  resize(); initParticles(); loop();
  window.addEventListener('resize', ()=>{ ctx.resetTransform(); resize(); });
})();
</script>
</body>
</html>
